name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci) so cross-platform optional deps like esbuild
        # and rollup binaries resolve correctly on the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
